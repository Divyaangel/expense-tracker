server.port=${PORT:4000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expense_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:divnsing}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:expense-tracker-secret-key-change-in-production-min-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}
